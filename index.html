<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amazon Clone - Ultra Compact Edition</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-custom-dark py-1 sticky-top"><div class="container-fluid px-3">
        <a class="navbar-brand border-hover p-2" href="#"><img src="https://pngimg.com/uploads/amazon/amazon_PNG11.png" alt="Logo" height="30"></a>
        <div class="text-white me-4 d-none d-md-block border-hover p-2"><small class="text-secondary d-block lh-1" style="font-size: 0.75rem;">Deliver to</small><span class="fw-bold"><i class="bi bi-geo-alt me-1"></i>India</span></div>
        <div class="input-group my-2 mx-lg-3 flex-grow-1 header-search">
            <button class="btn btn-light dropdown-toggle bg-gray border-0" type="button">All</button>
            <input type="text" class="form-control border-0 shadow-none" placeholder="Search Amazon">
            <button class="btn btn-warning border-0 px-3 search-btn" type="button"><i class="bi bi-search text-dark"></i></button>
        </div>
        <div class="d-flex align-items-center ms-auto">
            <div class="text-white me-3 border-hover p-2 cursor-pointer"><small class="d-block lh-1" style="font-size:0.75rem;">Hello, sign in</small><span class="fw-bold" style="font-size:0.85rem;">Account & Lists</span></div>
            <div class="text-white border-hover p-2 cursor-pointer position-relative d-flex align-items-center" id="cart-btn" data-bs-toggle="modal" data-bs-target="#cartModal">
                <i class="bi bi-cart3 fs-4 me-2"></i><span class="position-absolute top-0 start-50 translate-middle-x badge rounded-pill bg-warning text-dark" id="cart-count">0</span><span class="fw-bold align-self-end mt-2" style="font-size: 0.85rem;">Cart</span>
            </div>
        </div>
    </div></nav>
    <div class="bg-custom-light text-white py-2 px-3 d-flex gap-3 font-sm"><span class="fw-bold"><i class="bi bi-list me-1"></i> All</span><span>Today's Deals</span><span>Customer Service</span></div>

    <div id="heroCarousel" class="carousel slide position-relative bg-secondary" data-bs-ride="carousel"><div class="carousel-inner">
        <div class="carousel-item active"><svg class="w-100 hero-img" xmlns="http://www.w3.org/2000/svg"><rect width="100%" height="100%" fill="#2c3e50"/><text x="50%" y="50%" fill="#fff" font-size="3rem" font-weight="bold" text-anchor="middle">AMAZON MEGA SALE</text></svg></div>
        <div class="carousel-item"><svg class="w-100 hero-img" xmlns="http://www.w3.org/2000/svg"><rect width="100%" height="100%" fill="#16a085"/><text x="50%" y="50%" fill="#fff" font-size="3rem" font-weight="bold" text-anchor="middle">UPGRADE SMART HOME</text></svg></div>
    </div></div>

    <main class="container-fluid px-4 product-grid-offset z-3 position-relative" id="main-products-container"></main>

    <footer class="mt-5 text-center">
        <div class="bg-custom-gray text-white py-3 cursor-pointer transition-btn font-sm" id="back-to-top">Back to Top</div>
        <div class="bg-custom-light text-white py-4 font-sm">© 2026 Amazon Clone Project. Built with Bootstrap.</div>
    </footer>

    <div class="modal fade" id="cartModal" tabindex="-1" aria-hidden="true"><div class="modal-dialog modal-dialog-centered"><div class="modal-content p-3">
        <div class="modal-header border-0"><h5 class="modal-title fw-bold">Shopping Cart</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
        <div class="modal-body py-0" id="cart-items-container"><p class="text-muted text-center py-4 my-0">Your cart is empty.</p></div>
        <div class="modal-footer flex-column align-items-stretch border-0 pt-3">
            <div class="d-flex justify-content-between align-items-center mb-2"><h5 class="mb-0 fw-bold">Total Bill:</h5><h4 class="mb-0 fw-bold text-danger">₹<span id="cart-total-price">0</span></h4></div>
            <div class="d-flex gap-2 justify-content-end"><button type="button" class="btn btn-outline-secondary rounded-pill btn-sm" id="clear-cart-btn">Clear</button><button type="button" class="btn btn-warning rounded-pill btn-sm fw-bold" id="checkout-btn">Checkout</button></div>
        </div>
    </div></div></div>

    <div class="modal fade" id="zoomModal" tabindex="-1" aria-hidden="true"><div class="modal-dialog modal-dialog-centered modal-lg"><div class="modal-content border-0 bg-transparent">
        <div class="modal-header border-0 p-0 mb-2"><button type="button" class="btn-close btn-close-white ms-auto shadow-none" data-bs-dismiss="modal"></button></div>
        <div class="modal-body p-0 text-center bg-dark rounded overflow-hidden"><div class="zoom-img-container"><img src="" id="zoomTargetImg" class="img-fluid" alt="Zoom"></div></div>
    </div></div></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
